; IONIX I GPIO — ESP32 web UI (PlatformIO)
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.sdkconfig_defaults = sdkconfig.defaults
; Must match Serial.begin() in main.cpp.
monitor_speed = 115200
lib_deps =
  adafruit/Adafruit SSD1306 @ ^2.5.15
  adafruit/Adafruit GFX Library @ ^1.11.9
  ricmoo/QRCode
upload_speed = 460800
; Omit upload_port — use the correct [env] for your chip (classic ESP32 vs P4) and pass e.g. `--upload-port COM8` if needed.
build_flags =
  -DCORE_DEBUG_LEVEL=0

; Waveshare ESP32-P4-WIFI6-POE-ETH preparation.
; Keep this env separate so current ESP32 flashing workflow stays unchanged.
; Note: Depending on PlatformIO support level for ESP32-P4, board/platform package
; updates may be required before first successful compile on this target.
[env:waveshare_esp32_p4_poe]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-p4-evboard
framework = arduino
board_build.sdkconfig_defaults = sdkconfig.defaults
board_build.partitions = partitions_ota.csv
monitor_speed = 115200
; CH343 UART on this PC (ESP32-P4 Waveshare); change if COM number differs.
upload_port = COM8
upload_speed = 460800
lib_deps =
  adafruit/Adafruit SSD1306 @ ^2.5.15
  adafruit/Adafruit GFX Library @ ^1.11.9
  ricmoo/QRCode
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DUSE_ETHERNET_PORT
  -DIONIX_ETH_PHY_TYPE=ETH_PHY_IP101
  -DIONIX_ETH_PHY_ADDR=1
  -DIONIX_ETH_PHY_POWER=51
  -DIONIX_ETH_PHY_MDC=31
  -DIONIX_ETH_PHY_MDIO=52
  -DIONIX_ETH_CLK_MODE=EMAC_CLK_EXT_IN
